# Hermes Agent 配置示例
# 这个文件展示了如何配置 MiMo TTS 技能

# TTS 配置
tts:
  # 默认使用的 TTS provider
  provider: mimo
  
  providers:
    # MiMo TTS provider 配置
    mimo:
      type: command
      # 脚本路径会根据操作系统自动调整
      # Windows: C:\Users\你的用户名\AppData\Local\hermes\scripts\mimo_tts.py
      # Linux/macOS: ~/.hermes/scripts/mimo_tts.py
      command: python ~/.hermes/scripts/mimo_tts.py {output_path} {text}
      # Telegram 推荐使用 ogg 格式
      output_format: ogg

# 技能加载配置（可选，Hermes 会自动加载 skills 目录下的技能）
skills:
  # 确保 media/mimo-tts 技能被加载
  - media/mimo-tts
